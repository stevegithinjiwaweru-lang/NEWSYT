# ─────────────────────────────────────────────────────────────────────────────
# NEWSYT — production stack for the shared DigitalOcean droplet.
#
# Services
#   postgres   — Postgres 16, internal only, named volume.
#   redis      — Redis 7 with AOF, internal only, named volume.
#   migrate    — one-shot: `prisma migrate deploy` against postgres, then exits.
#                api waits on its success.
#   api        — NEWSYT Express + Socket.IO on :4000 (internal).
#   web        — Vite SPA served by nginx on :80 (internal).
#
# Networking
#   newsyt-internal     — private bridge (postgres + redis + api + web).
#   zucchini_internal   — external bridge owned by /opt/easybox; the shared
#                         zucchini-caddy resolves `newsyt-api` and `newsyt-web`
#                         on this network via service aliases.
#
# Bring up
#   cp deploy/.env.example deploy/.env && $EDITOR deploy/.env
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

name: newsyt

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [newsyt-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks: [newsyt-internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: newsyt-backend:latest
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [newsyt-internal]
    restart: "no"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: newsyt-backend:latest
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads-data:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      newsyt-internal: {}
      zucchini_internal:
        aliases:
          - newsyt-api
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_BASE_URL:?PUBLIC_API_BASE_URL is required}
    image: newsyt-frontend:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      newsyt-internal: {}
      zucchini_internal:
        aliases:
          - newsyt-web

volumes:
  postgres-data:
  redis-data:
  uploads-data:

networks:
  newsyt-internal:
    driver: bridge
  zucchini_internal:
    external: true

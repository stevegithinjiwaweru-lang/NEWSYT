version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: easybox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/easybox?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    # For local development we mount source so we can iterate quickly.
    volumes:
      - .:/app
      - /app/node_modules
    # Development command: run ts-node-dev for hot reload; it reads host sources and doesn't require dist
    command: sh -c "npm ci && npm run dev"
    # If you prefer to use the built production image (no mount), comment the volumes above and use:
    # command: sh -c "npm run build && npm run db:deploy && npm run seed && npm run start"
    # and ensure you do NOT mount the source into /app (so built dist remains inside the image).

volumes:
  pgdata:

version: "3.8"

services:
  # Prisma's MongoDB connector requires a replica set (even single-node) for
  # transactions/nested writes, so we use bitnami's image which auto-configures one.
  db:
    image: bitnami/mongodb:7.0
    restart: always
    environment:
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_ADVERTISED_HOSTNAME: db
      MONGODB_ROOT_PASSWORD: devpassword
      MONGODB_DATABASE: easybox
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/bitnami/mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://root:devpassword@db:27017/easybox?authSource=admin&replicaSet=rs0
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    # For local development we mount source so we can iterate quickly.
    volumes:
      - .:/app
      - /app/node_modules
    # Development command: run ts-node-dev for hot reload; it reads host sources and doesn't require dist
    command: sh -c "npm ci && npm run dev"
    # If you prefer to use the built production image (no mount), comment the volumes above and use:
    # command: sh -c "npm run build && npm run db:deploy && npm run seed && npm run start"
    # and ensure you do NOT mount the source into /app (so built dist remains inside the image).

volumes:
  mongodata:

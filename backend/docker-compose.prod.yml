version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: easybox_db
    environment:
      POSTGRES_DB: easybox_prod
      POSTGRES_USER: easybox_user
      POSTGRES_PASSWORD: change-this-password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybox_user -d easybox_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easybox_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: easybox_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - easybox_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easybox_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://easybox_user:change-this-password@db:5432/easybox_prod
      REDIS_URL: redis://redis:6379
      PORT: 4000
      UPLOADS_DIR: /app/uploads
      FRONTEND_URL: https://admin.easybox.ke
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      EASYBOX_API_KEY: ${EASYBOX_API_KEY}
      EASYBOX_WEBHOOK_SECRET: ${EASYBOX_WEBHOOK_SECRET}
      LOG_LEVEL: info
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - easybox_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local

networks:
  easybox_network:
    driver: bridge
